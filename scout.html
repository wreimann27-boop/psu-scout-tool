<!DOCTYPE html>
<html>
  <head>
    <title>Penn State Scout Tool</title>
    <style>
      body {
        font-family: sans-serif;
        background-color: #1e407c;
        display: flex;
        justify-content: center;
        padding: 40px;
      }
      .container {
        background-color: white;
        border-radius: 12px;
        padding: 32px;
        width: 680px;
      }
      h1 { color: #1e407c; margin: 0 0 20px 0; }
      input {
        width: 100%;
        padding: 12px;
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 8px;
        margin-bottom: 8px;
        box-sizing: border-box;
      }
      button {
        background-color: #1e407c;
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
      }
      #suggestion {
        font-size: 13px;
        color: #888;
        margin: 4px 0 12px 0;
        min-height: 18px;
      }
      #suggestion span {
        color: #1e407c;
        cursor: pointer;
        font-weight: 600;
        text-decoration: underline;
      }
      #playerInfo {
        background: #f0f4fa;
        border-radius: 8px;
        padding: 12px 16px;
        margin: 16px 0;
        font-size: 14px;
        color: #333;
        display: none;
      }
      #result {
        color: #555;
        font-size: 15px;
        margin-top: 16px;
        line-height: 1.8;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Penn State Scout Tool</h1>
      <select id="positionFilter" onchange="filterByPosition()" style="width:100%; padding:12px; font-size:16px; border:1px solid #ccc; border-radius:8px; margin-bottom:12px; box-sizing:border-box;">
        <option value="">All Positions</option>
        <option value="QB">QB</option>
        <option value="RB">RB</option>
        <option value="WR">WR</option>
        <option value="TE">TE</option>
        <option value="OL">OL</option>
        <option value="DE">DE</option>
        <option value="DT">DT</option>
        <option value="LB">LB</option>
        <option value="CB">CB</option>
        <option value="S">S</option>
        <option value="K">K</option>
        <option value="P">P</option>
        <option value="LS">LS</option>
      </select>
      <input id="playerInput" type="text" placeholder="Enter player name..."
        oninput="suggestPlayer()"
        onkeydown="if(event.key==='Enter') scoutPlayer()" />
      <div id="suggestion"></div>
      <div id="playerList" style="margin-bottom:12px;"></div>
      <button onclick="scoutPlayer()">Scout Player</button>
      <div id="playerInfo"></div>
      <p id="result">Enter a player name above and hit Scout Player.</p>
    </div>
  </body>

  <script>
    let roster = [];

    async function loadRoster() {
      try {
        const response = await fetch('/api/players');
        roster = await response.json();
      } catch (err) {
        console.error('Failed to load roster:', err);
      }
    }

    loadRoster();

    function fuzzyMatch(input, name) {
      input = input.toLowerCase();
      name = name.toLowerCase();
      if (name.includes(input)) return true;
      const words = input.split(" ");
      return words.every(word => name.includes(word));
    }

    function findPlayer(input) {
      if (!input.trim()) return null;
      return roster.find(p => fuzzyMatch(input, p.name)) || null;
    }

    function suggestPlayer() {
      const input = document.getElementById("playerInput").value;
      const suggestionEl = document.getElementById("suggestion");
      const player = findPlayer(input);
      if (player && player.name.toLowerCase() !== input.toLowerCase()) {
        suggestionEl.innerHTML = `Did you mean <span onclick="selectPlayer('${player.name}')">${player.name}</span>?`;
      } else {
        suggestionEl.innerHTML = "";
      }
    }

    function selectPlayer(name) {
      document.getElementById("playerInput").value = name;
      document.getElementById("suggestion").innerHTML = "";
    }

    function filterByPosition() {
      const position = document.getElementById("positionFilter").value;
      const listEl = document.getElementById("playerList");

      if (!position) {
        listEl.innerHTML = "";
        return;
      }

      const filtered = roster.filter(p => p.position === position);

      if (filtered.length === 0) {
        listEl.innerHTML = "<p style='color:#888; font-size:13px;'>No players found.</p>";
        return;
      }

      listEl.innerHTML = filtered.map(p =>
        `<div onclick="selectPlayer('${p.name}')" style="padding:8px 12px; cursor:pointer; border-radius:6px; font-size:14px; color:#1e407c; font-weight:500; border-bottom:1px solid #eee;">
          #${p.number} ${p.name} <span style="color:#888; font-weight:400;">· ${p.year}</span>
        </div>`
      ).join("");
    }

    async function scoutPlayer() {
      const input = document.getElementById("playerInput").value;
      const player = findPlayer(input);

      if (!player) {
        document.getElementById("playerInfo").style.display = "none";
        document.getElementById("result").innerText = "Player not found. Check the spelling and try again.";
        return;
      }

      document.getElementById("playerInfo").style.display = "block";
      document.getElementById("playerInfo").innerHTML =
        `<strong>#${player.number} ${player.name}</strong> &nbsp;·&nbsp; ${player.position} &nbsp;·&nbsp; ${player.year} &nbsp;·&nbsp; ${player.height}, ${player.weight} &nbsp;·&nbsp; ${player.hometown}`;

      document.getElementById("result").innerText = "Generating scouting report...";

      const prompt = `You are an elite college football analyst working for Penn State Football. Generate a structured scouting report for the following player:

Name: ${player.name}
Number: #${player.number}
Position: ${player.position}
Year: ${player.year}
Height: ${player.height}
Weight: ${player.weight}
Hometown: ${player.hometown}

Format the report exactly like this — use these exact labels as plain text headers, no markdown symbols like # or **:

OVERVIEW
2-3 sentences summarizing the player's role, physical profile, and where they are in their development.

STRENGTHS
- 3 bullet points highlighting what this player does well for their position and physical profile.

WEAKNESSES
- 3 bullet points identifying areas where this player may struggle or has room to grow.

AREAS TO DEVELOP
2-3 sentences on what this player needs to improve to reach their ceiling at the college or next level.

Use a dash - for bullet points. Do not use ** or # anywhere in your response.

Be specific to their position, size, and year in school. Do not invent statistics. Write like a professional scout.`;

      try {
        const response = await fetch("/api/scout", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt: prompt })
        });

        const data = await response.json();

        if (!data.result) {
          document.getElementById("result").innerText = "Error generating report. Try again.";
          console.error("API error:", data);
          return;
        }

        const formatted = data.result
          .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
          .replace(/\n\n/g, '<br><br>')
          .replace(/\n/g, '<br>');
        document.getElementById("result").innerHTML = formatted;

      } catch (err) {
        document.getElementById("result").innerText = "Network error. Try again.";
        console.error("Fetch error:", err);
      }
    }
  </script>
</html>
